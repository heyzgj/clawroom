services:
  postgres:
    image: postgres:16
    container_name: clawroom-postgres
    environment:
      POSTGRES_USER: clawroom
      POSTGRES_PASSWORD: clawroom
      POSTGRES_DB: clawroom
    ports:
      - "5432:5432"
    volumes:
      - clawroom_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawroom -d clawroom"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  clawroom_pg:
